# ============================================================
# SGD - Sistema de Gestión Documental
# Docker Compose - Arquitectura de Microservicios
# ============================================================
# Levanta todo el stack con: docker compose up --build
# Requiere un archivo .env en la misma carpeta (ver .env.example)
# ============================================================

services:
  # --- Base de Datos PostgreSQL ---
  postgres:
    image: postgres:15-alpine
    container_name: sgd-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sgd-network

  # --- Cache Redis ---
  redis:
    image: redis:7-alpine
    container_name: sgd-redis
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - sgd-network

  # --- Microservicio de Autenticación (TCP :3001) ---
  ms-auth:
    image: ghcr.io/carlosvsq/gestor-documental-gps/ms-auth:latest
    build:
      context: ./backend
      dockerfile: ms-auth/Dockerfile
      network: host
    container_name: sgd-ms-auth
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sgd-network

  # --- Microservicio de Mantenedores (TCP :3002) ---
  ms-mantenedores:
    image: ghcr.io/carlosvsq/gestor-documental-gps/ms-mantenedores:latest
    build:
      context: ./backend
      dockerfile: ms-mantenedores/Dockerfile
      network: host
    container_name: sgd-ms-mantenedores
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sgd-network

  # --- Microservicio de Documentos (TCP :3003) ---
  ms-documentos:
    image: ghcr.io/carlosvsq/gestor-documental-gps/ms-documentos:latest
    build:
      context: ./backend
      dockerfile: ms-documentos/Dockerfile
      network: host
    container_name: sgd-ms-documentos
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sgd-network

  # --- Microservicio de Requerimientos (TCP :3004) ---
  ms-requerimientos:
    image: ghcr.io/carlosvsq/gestor-documental-gps/ms-requerimientos:latest
    build:
      context: ./backend
      dockerfile: ms-requerimientos/Dockerfile
      network: host
    container_name: sgd-ms-requerimientos
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sgd-network

  # --- API Gateway (HTTP :3000, punto de entrada único) ---
  api-gateway:
    image: ghcr.io/carlosvsq/gestor-documental-gps/api-gateway:latest
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
      network: host
    container_name: sgd-api-gateway
    env_file:
      - .env
    environment:
      PORT: ${BACKEND_PORT}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      AUTH_SERVICE_HOST: ms-auth
      AUTH_SERVICE_PORT: 3001
      MANTENEDORES_SERVICE_HOST: ms-mantenedores
      MANTENEDORES_SERVICE_PORT: 3002
      DOCUMENTOS_SERVICE_HOST: ms-documentos
      DOCUMENTOS_SERVICE_PORT: 3003
      REQUERIMIENTOS_SERVICE_HOST: ms-requerimientos
      REQUERIMIENTOS_SERVICE_PORT: 3004
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    volumes:
      - uploads:/app/uploads
    depends_on:
      - ms-auth
      - ms-mantenedores
      - ms-documentos
      - ms-requerimientos
      - redis
    networks:
      - sgd-network

  # --- Frontend React (puerto expuesto al exterior) ---
  frontend:
    image: ghcr.io/carlosvsq/gestor-documental-gps/frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      network: host
    container_name: sgd-frontend
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - api-gateway
    networks:
      - sgd-network

  # ============================================================
  # Observabilidad — Prometheus + cAdvisor + node-exporter + Grafana
  # ------------------------------------------------------------
  # Solo Grafana se expone al host; el resto vive dentro de sgd-network.
  # ============================================================

  # --- Métricas de contenedores (interno) ---
  # Config minimalista que funciona tanto con Docker como con Podman rootless.
  # En Docker server (producción) cAdvisor leerá métricas de todos los contenedores.
  # En Podman rootless local puede reportar menos métricas, pero arranca limpio.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: sgd-cadvisor
    command:
      - '--housekeeping_interval=10s'
      - '--store_container_labels=false'
    volumes:
      - /sys:/sys:ro
    networks:
      - sgd-network

  # --- Métricas del host Linux (interno) ---
  # Sin bind-mount de "/" (incompatible con rootless). Mantiene /proc y /sys.
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: sgd-node-exporter
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    networks:
      - sgd-network

  # --- Prometheus (interno, solo Grafana lo consulta) ---
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: sgd-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    depends_on:
      - cadvisor
      - node-exporter
      - api-gateway
    networks:
      - sgd-network

  # --- Grafana (ÚNICO portal de observabilidad expuesto al host) ---
  grafana:
    image: grafana/grafana:11.2.0
    container_name: sgd-grafana
    env_file:
      - .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT}:3000"
    depends_on:
      - prometheus
    networks:
      - sgd-network

volumes:
  pgdata:
    driver: local
  uploads:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  sgd-network:
    driver: bridge
