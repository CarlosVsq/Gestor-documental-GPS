version: '3.8'

services:
  api:
    build: 
      context: ./api
      dockerfile: Dockerfile
    container_name: gps-api
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=gps_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - gps-network

  postgres:
    image: postgres:15-alpine
    container_name: gps-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=gps_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - gps-network

  redis:
    image: redis:7-alpine
    container_name: gps-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - gps-network

volumes:
  pgdata:
  redisdata:

networks:
  gps-network:
    driver: bridge
