# ============================================================
# SGD - Sistema de Gestión Documental
# Docker Compose - Arquitectura de Microservicios
# ============================================================
# Levanta todo el stack con: docker compose up --build
# Requiere un archivo .env en la misma carpeta (ver .env.example)
# ============================================================

services:
  # --- Base de Datos PostgreSQL ---
  postgres:
    image: postgres:15-alpine
    container_name: sgd-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sgd-network

  # --- Cache Redis ---
  redis:
    image: redis:7-alpine
    container_name: sgd-redis
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - sgd-network

  # --- Microservicio de Autenticación (TCP :3001) ---
  ms-auth:
    image: ghcr.io/carlosvsq/gestor-documental-gps/ms-auth:latest
    build:
      context: ./backend
      dockerfile: ms-auth/Dockerfile
      network: host
    container_name: sgd-ms-auth
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sgd-network

  # --- Microservicio de Mantenedores (TCP :3002) ---
  ms-mantenedores:
    image: ghcr.io/carlosvsq/gestor-documental-gps/ms-mantenedores:latest
    build:
      context: ./backend
      dockerfile: ms-mantenedores/Dockerfile
      network: host
    container_name: sgd-ms-mantenedores
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sgd-network

  # --- [DEPRECADO] Microservicio de Documentos (reemplazado por ms-almacenamiento) ---
  # ms-documentos NO se levanta. Ver backend/ms-documentos/DEPRECATED.md

  # --- SeaweedFS Master (coordinador del cluster) ---
  seaweedfs-master:
    image: chrislusf/seaweedfs:latest
    container_name: sgd-seaweedfs-master
    command: "master -ip=seaweedfs-master -port=9333 -mdir=/data"
    volumes:
      - seaweedfs-master-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://seaweedfs-master:9333/cluster/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sgd-network

  # --- SeaweedFS Volume Node (almacenamiento real de archivos) ---
  seaweedfs-volume:
    image: chrislusf/seaweedfs:latest
    container_name: sgd-seaweedfs-volume
    command: "volume -mserver=seaweedfs-master:9333 -port=8080 -ip=seaweedfs-volume -dir=/data -max=100"
    volumes:
      - seaweedfs-volume-data:/data
    depends_on:
      seaweedfs-master:
        condition: service_healthy
    networks:
      - sgd-network

  # --- SeaweedFS Filer (API REST para operaciones de archivos) ---
  # Expone API REST en :8888 — usado por ms-almacenamiento
  seaweedfs-filer:
    image: chrislusf/seaweedfs:latest
    container_name: sgd-seaweedfs-filer
    command: "filer -master=seaweedfs-master:9333 -port=8888 -ip=seaweedfs-filer"
    volumes:
      - seaweedfs-filer-data:/data
    depends_on:
      seaweedfs-volume:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://seaweedfs-filer:8888/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sgd-network

  # --- Microservicio de Almacenamiento (TCP :3003) — reemplaza ms-documentos ---
  ms-almacenamiento:
    build:
      context: ./backend
      dockerfile: ms-almacenamiento/Dockerfile
      network: host
    container_name: sgd-ms-almacenamiento
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      SEAWEEDFS_FILER_URL: http://seaweedfs-filer:8888
      # Configura las restricciones de archivos:
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-50}
      ALLOWED_MIME_TYPES: ${ALLOWED_MIME_TYPES:-application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/msword,image/png,image/jpeg,image/gif,image/webp}
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs-filer:
        condition: service_healthy
    networks:
      - sgd-network

  # --- Microservicio de Requerimientos (TCP :3004) ---
  ms-requerimientos:
    build:
      context: ./backend
      dockerfile: ms-requerimientos/Dockerfile
      network: host
    container_name: sgd-ms-requerimientos
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      ALMACENAMIENTO_SERVICE_HOST: ms-almacenamiento
      ALMACENAMIENTO_SERVICE_PORT: 3003
    depends_on:
      postgres:
        condition: service_healthy
      ms-almacenamiento:
        condition: service_started
    networks:
      - sgd-network

  # --- API Gateway (HTTP :3000, punto de entrada único) ---
  api-gateway:
    image: ghcr.io/carlosvsq/gestor-documental-gps/api-gateway:latest
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
      network: host
    container_name: sgd-api-gateway
    env_file:
      - .env
    environment:
      PORT: ${BACKEND_PORT}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      AUTH_SERVICE_HOST: ms-auth
      AUTH_SERVICE_PORT: 3001
      MANTENEDORES_SERVICE_HOST: ms-mantenedores
      MANTENEDORES_SERVICE_PORT: 3002
      # DOCUMENTOS_SERVICE apunta a ms-almacenamiento (backward compat)
      DOCUMENTOS_SERVICE_HOST: ms-almacenamiento
      DOCUMENTOS_SERVICE_PORT: 3003
      ALMACENAMIENTO_SERVICE_HOST: ms-almacenamiento
      ALMACENAMIENTO_SERVICE_PORT: 3003
      REQUERIMIENTOS_SERVICE_HOST: ms-requerimientos
      REQUERIMIENTOS_SERVICE_PORT: 3004
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-50}
    depends_on:
      - ms-auth
      - ms-mantenedores
      - ms-almacenamiento
      - ms-requerimientos
      - redis
    networks:
      - sgd-network

  # --- Frontend React (único puerto expuesto al exterior) ---
  frontend:
    image: ghcr.io/carlosvsq/gestor-documental-gps/frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      network: host
    container_name: sgd-frontend
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - api-gateway
    networks:
      - sgd-network

volumes:
  pgdata:
    driver: local
  seaweedfs-master-data:
    driver: local
  seaweedfs-volume-data:
    driver: local
  seaweedfs-filer-data:
    driver: local

networks:
  sgd-network:
    driver: bridge
