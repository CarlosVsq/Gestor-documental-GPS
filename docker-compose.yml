# ============================================================
# SGD - Sistema de Gestión Documental
# Docker Compose - Orquestación de Servicios
# ============================================================
# Levanta todo el stack con: docker compose up --build
# Requiere un archivo .env en la misma carpeta (ver .env.example)
# ============================================================

services:
  # --- Base de Datos PostgreSQL ---
  postgres:
    image: postgres:15-alpine
    container_name: sgd-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sgd-network

  # --- Cache Redis ---
  redis:
    image: redis:7-alpine
    container_name: sgd-redis
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - sgd-network

  # --- Backend NestJS (solo accesible internamente) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    container_name: sgd-backend
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      PORT: ${BACKEND_PORT}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sgd-network

  # --- Frontend React (único puerto expuesto al exterior) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      network: host
    container_name: sgd-frontend
    env_file:
      - .env

    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
    networks:
      - sgd-network

volumes:
  pgdata:
    driver: local

networks:
  sgd-network:
    driver: bridge
