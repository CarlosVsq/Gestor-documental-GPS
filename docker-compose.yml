# ============================================================
# SGD - Sistema de Gestión Documental
# Docker Compose - Arquitectura de Microservicios
# ============================================================
# Levanta todo el stack con: docker compose up --build
# Requiere un archivo .env en la misma carpeta (ver .env.example)
# ============================================================

services:
  # --- Base de Datos PostgreSQL ---
  postgres:
    image: postgres:15-alpine
    container_name: sgd-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sgd-network

  # --- Cache Redis ---
  redis:
    image: redis:7-alpine
    container_name: sgd-redis
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - sgd-network

  # --- Microservicio de Autenticación (TCP :3001) ---
  ms-auth:
    image: ghcr.io/carlosvsq/gestor-documental-gps/ms-auth:latest
    build:
      context: ./backend
      dockerfile: ms-auth/Dockerfile
      network: host
    container_name: sgd-ms-auth
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sgd-network

  # --- Microservicio de Mantenedores (TCP :3002) ---
  ms-mantenedores:
    image: ghcr.io/carlosvsq/gestor-documental-gps/ms-mantenedores:latest
    build:
      context: ./backend
      dockerfile: ms-mantenedores/Dockerfile
      network: host
    container_name: sgd-ms-mantenedores
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sgd-network

  # --- Microservicio de Documentos (TCP :3003) ---
  ms-documentos:
    image: ghcr.io/carlosvsq/gestor-documental-gps/ms-documentos:latest
    build:
      context: ./backend
      dockerfile: ms-documentos/Dockerfile
      network: host
    container_name: sgd-ms-documentos
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sgd-network

  # --- Microservicio de Requerimientos (TCP :3004) ---
  ms-requerimientos:
    image: ghcr.io/carlosvsq/gestor-documental-gps/ms-requerimientos:latest
    build:
      context: ./backend
      dockerfile: ms-requerimientos/Dockerfile
      network: host
    container_name: sgd-ms-requerimientos
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sgd-network

  # --- API Gateway (HTTP :3000, punto de entrada único) ---
  api-gateway:
    image: ghcr.io/carlosvsq/gestor-documental-gps/api-gateway:latest
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
      network: host
    container_name: sgd-api-gateway
    env_file:
      - .env
    environment:
      PORT: ${BACKEND_PORT}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      AUTH_SERVICE_HOST: ms-auth
      AUTH_SERVICE_PORT: 3001
      MANTENEDORES_SERVICE_HOST: ms-mantenedores
      MANTENEDORES_SERVICE_PORT: 3002
      DOCUMENTOS_SERVICE_HOST: ms-documentos
      DOCUMENTOS_SERVICE_PORT: 3003
      REQUERIMIENTOS_SERVICE_HOST: ms-requerimientos
      REQUERIMIENTOS_SERVICE_PORT: 3004
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    volumes:
      - uploads:/app/uploads
    depends_on:
      - ms-auth
      - ms-mantenedores
      - ms-documentos
      - ms-requerimientos
      - redis
    networks:
      - sgd-network

  # --- Frontend React (único puerto expuesto al exterior) ---
  frontend:
    image: ghcr.io/carlosvsq/gestor-documental-gps/frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      network: host
    container_name: sgd-frontend
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - api-gateway
    networks:
      - sgd-network

volumes:
  pgdata:
    driver: local
  uploads:
    driver: local

networks:
  sgd-network:
    driver: bridge
