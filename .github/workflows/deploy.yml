# ============================================================
# SGD - Pipeline de Despliegue Continuo
# GitHub Actions Workflow (Self-Hosted Runner)
# ============================================================
# Se ejecuta después de que el CI pase exitosamente en main.
# El runner está instalado en el servidor de producción,
# por lo que no necesita SSH ni push a registros externos.
# ============================================================

name: SGD CD - Deploy

on:
  workflow_run:
    workflows: ["SGD CI - Tests"]
    types:
      - completed
    branches: [ main ]

jobs:
  deploy:
    name: Deploy al Servidor
    runs-on: self-hosted
    permissions:
      packages: read
      contents: read
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Copiar variables de entorno
        run: |
          cp ~/sgd-config/.env .env

      - name: Login en GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull de imágenes actualizadas
        run: |
          docker compose pull

      - name: Levantar servicios con Docker Compose
        run: |
          docker compose up -d --remove-orphans

      - name: Verificar salud de los servicios
        run: |
          sleep 15
          UNHEALTHY=$(docker compose ps | grep -E "Exit|unhealthy" | awk '{print $1}')
          if [ -n "$UNHEALTHY" ]; then
            echo "Servicios no saludables:"
            echo "$UNHEALTHY"
            docker compose logs $UNHEALTHY
            exit 1
          fi
          echo "Todos los servicios están saludables."

      - name: Limpiar imágenes sin usar
        run: |
          docker image prune -f

      - name: Resumen del Deploy
        run: |
          echo "## Deploy completado" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          docker compose ps >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Ver logs del runner" >> $GITHUB_STEP_SUMMARY
