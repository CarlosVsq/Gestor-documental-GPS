# ============================================================
# SGD - Configuración de Prometheus
# ------------------------------------------------------------
# Todos los targets viven dentro de sgd-network (no expuestos al host).
# Prometheus tampoco se expone — solo Grafana lo consulta internamente.
# ============================================================

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    cluster: sgd-local

scrape_configs:
  # --- Métricas de aplicación: API Gateway (HTTP + downstream TCP) ---
  - job_name: 'api-gateway'
    metrics_path: /metrics
    static_configs:
      - targets: ['api-gateway:3000']
        labels:
          service: api-gateway

  # --- Métricas de contenedores Docker (cAdvisor) ---
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # --- Métricas del host Linux (node-exporter) ---
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # --- El propio Prometheus (self-monitoring, útil en Grafana) ---
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
